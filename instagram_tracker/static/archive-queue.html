<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0e10" />
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/styles.css?v=6" />
  <title>Archive queue — IG Tracker</title>
  <style>
    body { padding: 32px 24px 80px; }
    .aq-page-head {
      max-width: 880px;
      margin: 0 auto 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .aq-page-head h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.01em; }
    .aq-page-head .stats { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
    .aq-page-head .back-link {
      align-self: flex-start;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-elev-2);
      transition: border-color 120ms ease, color 120ms ease;
    }
    .aq-page-head .back-link:hover { border-color: var(--accent); color: var(--accent); }
    .aq-add-row {
      max-width: 880px;
      margin: 0 auto 16px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .aq-add-row input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
    }
    .aq-add-row input[type="text"]:focus { outline: none; border-color: var(--accent); }
    .aq-add-row button {
      padding: 10px 18px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
      cursor: pointer;
    }
    .aq-add-row button:hover { border-color: var(--accent); color: var(--accent); }
    .aq-search {
      max-width: 880px;
      margin: 0 auto 12px;
    }
    .aq-search input {
      width: 100%;
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
      box-sizing: border-box;
    }
    .aq-section-head {
      max-width: 880px;
      margin: 18px auto 6px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .aq-list {
      max-width: 880px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      list-style: none;
      padding: 0;
    }
    .aq-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .aq-list .qbadge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--bg-elev-2);
      color: var(--muted);
      border: 1px solid var(--border);
      letter-spacing: 0.02em;
    }
    .aq-list .qbadge.manual { background: rgba(120,160,255,0.12); color: #9bb6ff; border-color: rgba(120,160,255,0.4); }
    .aq-list .qbadge.partial { background: rgba(255,180,90,0.12); color: #ffc999; border-color: rgba(255,180,90,0.4); }
    .aq-list .qname { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .aq-list .qname a { color: var(--text); text-decoration: none; }
    .aq-list .qname a:hover { color: var(--accent); }
    .aq-list .qremove {
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    .aq-list .qremove:hover { color: #ff8888; border-color: #b45a5a; }
    .aq-empty {
      max-width: 880px;
      margin: 24px auto;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 10px;
    }
    .aq-flash {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      border-radius: 6px;
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }
    .aq-flash.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="aq-page-head">
    <a href="/" class="back-link">← Back to tracker</a>
    <h1>📥 Archive queue</h1>
    <p class="stats" id="aq-stats">loading…</p>
    <p class="muted small" style="margin:0">Accounts the auto-archive runner will visit. Manual entries (added here or from the popup) come first, then favorites by added-at. Removing a favorite from the queue tags it <code>archive_skip</code> so it stops re-appearing without un-favoriting it.</p>
  </div>

  <div class="aq-add-row">
    <input type="text" id="aq-add-input" placeholder="Add @username to queue" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
    <button id="aq-add-btn">Add</button>
  </div>

  <div class="aq-search">
    <input type="search" id="aq-search-input" placeholder="Filter queue…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
  </div>

  <div id="aq-content"></div>

  <div class="aq-flash" id="aq-flash"></div>

  <script>
    "use strict";
    const $ = (s) => document.querySelector(s);
    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({"&": "&amp;","<": "&lt;",">": "&gt;",'"': "&quot;","'": "&#39;"}[c]));
    }
    function flash(msg, ms = 1800) {
      const el = $("#aq-flash");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(flash._t);
      flash._t = setTimeout(() => el.classList.remove("show"), ms);
    }

    let _filter = "";

    async function fetchQueue() {
      const r = await fetch("/api/archive-queue");
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }

    async function setTag(username, flag, value) {
      const r = await fetch("/api/tags", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, flag, value }),
      });
      if (!r.ok) {
        const txt = await r.text().catch(() => "");
        throw new Error(`HTTP ${r.status}: ${txt}`);
      }
      return r.json();
    }

    function render(data) {
      const queue = data.queue || [];
      const stats = data.stats || {};
      const manualSet = new Set(data.manual_in_queue || []);
      const filterLower = _filter.toLowerCase().replace(/^@/, "");
      const filtered = filterLower
        ? queue.filter((u) => u.toLowerCase().includes(filterLower))
        : queue;

      $("#aq-stats").textContent = [
        `${queue.length} queued`,
        stats.manual_in_queue ? `${stats.manual_in_queue} manual` : null,
        stats.skipped_already_archived ? `${stats.skipped_already_archived} already archived` : null,
        stats.skipped_user_cleared ? `${stats.skipped_user_cleared} you cleared` : null,
        stats.skipped_tagged ? `${stats.skipped_tagged} skipped (tagged)` : null,
        filterLower && filtered.length !== queue.length ? `${filtered.length} match filter` : null,
      ].filter(Boolean).join(" · ");

      const content = $("#aq-content");
      if (queue.length === 0) {
        content.innerHTML = `<div class="aq-empty">Queue is empty. Add a username above, or favorite an account to auto-include it.</div>`;
        return;
      }
      if (filtered.length === 0) {
        content.innerHTML = `<div class="aq-empty">No queue entries match "${escapeHtml(_filter)}".</div>`;
        return;
      }

      const manual = filtered.filter((u) => manualSet.has(u));
      const fav = filtered.filter((u) => !manualSet.has(u));

      const renderRow = (u) => {
        const isManual = manualSet.has(u);
        const safeU = escapeHtml(u);
        return `<li>
          <span class="qbadge${isManual ? " manual" : ""}">${isManual ? "manual" : "favorite"}</span>
          <span class="qname"><a href="https://www.instagram.com/${encodeURIComponent(u)}/" target="_blank" rel="noopener">@${safeU}</a></span>
          <button class="qremove" data-username="${safeU}" data-manual="${isManual ? "1" : "0"}">Remove</button>
        </li>`;
      };

      const parts = [];
      if (manual.length) {
        parts.push(`<div class="aq-section-head">Manual (${manual.length}) · processed first</div>`);
        parts.push(`<ul class="aq-list">${manual.map(renderRow).join("")}</ul>`);
      }
      if (fav.length) {
        parts.push(`<div class="aq-section-head">Favorites (${fav.length})</div>`);
        parts.push(`<ul class="aq-list">${fav.map(renderRow).join("")}</ul>`);
      }
      content.innerHTML = parts.join("");

      content.querySelectorAll(".qremove").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const u = btn.dataset.username;
          const isManual = btn.dataset.manual === "1";
          btn.disabled = true;
          btn.textContent = "…";
          try {
            if (isManual) {
              // Manual entries: untag need_archive.
              await setTag(u, "need_archive", false);
            } else {
              // Favorite: set archive_skip so it stops re-queueing,
              // without un-favoriting it.
              await setTag(u, "archive_skip", true);
            }
            flash(`Removed @${u}`);
            await refresh();
          } catch (e) {
            btn.disabled = false;
            btn.textContent = "Failed";
            flash(`Remove failed: ${e.message}`);
            setTimeout(() => { btn.textContent = "Remove"; }, 1500);
          }
        });
      });
    }

    async function refresh() {
      try {
        const data = await fetchQueue();
        render(data);
      } catch (e) {
        $("#aq-content").innerHTML = `<div class="aq-empty">Couldn't load queue: ${escapeHtml(e.message)}</div>`;
      }
    }

    async function doAdd() {
      const input = $("#aq-add-input");
      const btn = $("#aq-add-btn");
      const raw = (input.value || "").trim().replace(/^@/, "");
      if (!raw) return;
      btn.disabled = true;
      btn.textContent = "Adding…";
      try {
        await setTag(raw, "need_archive", true);
        // Also clear any prior archive_skip on this user so a re-add
        // actually reinstates them in the queue.
        try { await setTag(raw, "archive_skip", false); } catch {}
        input.value = "";
        flash(`Added @${raw}`);
        await refresh();
      } catch (e) {
        flash(`Add failed: ${e.message}`);
      } finally {
        btn.disabled = false;
        btn.textContent = "Add";
      }
    }

    $("#aq-add-btn").addEventListener("click", doAdd);
    $("#aq-add-input").addEventListener("keydown", (e) => { if (e.key === "Enter") doAdd(); });
    $("#aq-search-input").addEventListener("input", (e) => {
      _filter = e.target.value || "";
      // Re-render from cached fetch — refetch is unnecessary for filter.
      refresh();
    });

    refresh();
  </script>
</body>
</html>
