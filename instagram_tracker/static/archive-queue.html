<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0e10" />
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/styles.css?v=6" />
  <title>Archive queue — IG Tracker</title>
  <style>
    body { padding: 32px 24px 80px; }
    .aq-page-head {
      max-width: 880px;
      margin: 0 auto 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .aq-page-head h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.01em; }
    .aq-page-head .stats { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
    .aq-page-head .back-link {
      align-self: flex-start;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-elev-2);
      transition: border-color 120ms ease, color 120ms ease;
    }
    .aq-page-head .back-link:hover { border-color: var(--accent); color: var(--accent); }
    .aq-add-row {
      max-width: 880px;
      margin: 0 auto 16px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .aq-add-row input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
    }
    .aq-add-row input[type="text"]:focus { outline: none; border-color: var(--accent); }
    .aq-add-row button {
      padding: 10px 18px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
      cursor: pointer;
    }
    .aq-add-row button:hover { border-color: var(--accent); color: var(--accent); }
    .aq-search {
      max-width: 880px;
      margin: 0 auto 12px;
    }
    .aq-search input {
      width: 100%;
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
      box-sizing: border-box;
    }
    .aq-section-head {
      max-width: 880px;
      margin: 18px auto 6px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .aq-list {
      max-width: 880px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      list-style: none;
      padding: 0;
    }
    .aq-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: grab;
      transition: opacity 120ms ease, transform 120ms ease, border-color 120ms ease;
    }
    .aq-list li:active { cursor: grabbing; }
    .aq-list li.dragging { opacity: 0.4; }
    .aq-list li.drop-target { border-color: var(--accent); }
    .aq-list .qhandle {
      color: var(--muted);
      font-size: 14px;
      cursor: grab;
      user-select: none;
      padding: 0 4px;
    }
    .aq-list li:active .qhandle { cursor: grabbing; }
    .aq-list .qbadge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--bg-elev-2);
      color: var(--muted);
      border: 1px solid var(--border);
      letter-spacing: 0.02em;
    }
    .aq-list .qbadge.manual { background: rgba(120,160,255,0.12); color: #9bb6ff; border-color: rgba(120,160,255,0.4); }
    .aq-list .qbadge.partial { background: rgba(255,180,90,0.12); color: #ffc999; border-color: rgba(255,180,90,0.4); }
    .aq-list .qname { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .aq-list .qname a { color: var(--text); text-decoration: none; }
    .aq-list .qname a:hover { color: var(--accent); }
    .aq-list .qremove {
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    .aq-list .qremove:hover { color: #ff8888; border-color: #b45a5a; }
    .aq-empty {
      max-width: 880px;
      margin: 24px auto;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 10px;
    }
    .aq-flash {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      border-radius: 6px;
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }
    .aq-flash.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="aq-page-head">
    <a href="/" class="back-link">← Back to tracker</a>
    <h1>📥 Archive queue</h1>
    <p class="stats" id="aq-stats">loading…</p>
    <p class="muted small" style="margin:0">Accounts the auto-archive runner will visit. Only manually-added entries (the popup, the Add field below, or the <code>need_archive</code> tag) — favorites are not auto-included. Drag rows to reorder; the runner processes top-to-bottom.</p>
  </div>

  <div class="aq-add-row">
    <input type="text" id="aq-add-input" placeholder="Add username, @handle, or instagram.com URL (paste multiple separated by commas / spaces / newlines)" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
    <button id="aq-add-btn">Add</button>
  </div>

  <div class="aq-search">
    <input type="search" id="aq-search-input" placeholder="Filter queue…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
  </div>

  <div id="aq-content"></div>

  <div class="aq-flash" id="aq-flash"></div>

  <script>
    "use strict";
    const $ = (s) => document.querySelector(s);
    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({"&": "&amp;","<": "&lt;",">": "&gt;",'"': "&quot;","'": "&#39;"}[c]));
    }
    function flash(msg, ms = 1800) {
      const el = $("#aq-flash");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(flash._t);
      flash._t = setTimeout(() => el.classList.remove("show"), ms);
    }

    let _filter = "";

    async function fetchQueue() {
      const r = await fetch("/api/archive-queue");
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }

    async function setTag(username, flag, value) {
      const r = await fetch("/api/tags", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, flag, value }),
      });
      if (!r.ok) {
        const txt = await r.text().catch(() => "");
        throw new Error(`HTTP ${r.status}: ${txt}`);
      }
      return r.json();
    }

    let _currentQueue = [];

    async function saveOrder(usernames) {
      const r = await fetch("/api/archive-queue/order", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usernames }),
      });
      if (!r.ok) {
        const txt = await r.text().catch(() => "");
        throw new Error(`HTTP ${r.status}: ${txt}`);
      }
      return r.json();
    }

    function render(data) {
      _currentQueue = (data.queue || []).slice();
      const queue = _currentQueue;
      const stats = data.stats || {};
      const filterLower = _filter.toLowerCase().replace(/^@/, "");
      const filtered = filterLower
        ? queue.filter((u) => u.toLowerCase().includes(filterLower))
        : queue;

      $("#aq-stats").textContent = [
        `${queue.length} queued`,
        stats.skipped_already_archived ? `${stats.skipped_already_archived} already archived` : null,
        stats.skipped_user_cleared ? `${stats.skipped_user_cleared} you cleared` : null,
        stats.skipped_tagged ? `${stats.skipped_tagged} skipped (tagged)` : null,
        filterLower && filtered.length !== queue.length ? `${filtered.length} match filter` : null,
      ].filter(Boolean).join(" · ");

      const content = $("#aq-content");
      if (queue.length === 0) {
        content.innerHTML = `<div class="aq-empty">Queue is empty. Add a username above to queue an account for auto-archiving.</div>`;
        return;
      }
      if (filtered.length === 0) {
        content.innerHTML = `<div class="aq-empty">No queue entries match "${escapeHtml(_filter)}".</div>`;
        return;
      }

      const renderRow = (u) => {
        const safeU = escapeHtml(u);
        return `<li draggable="true" data-username="${safeU}">
          <span class="qhandle" title="Drag to reorder">⋮⋮</span>
          <span class="qbadge manual">manual</span>
          <span class="qname"><a href="https://www.instagram.com/${encodeURIComponent(u)}/" target="_blank" rel="noopener">@${safeU}</a></span>
          <button class="qremove" data-username="${safeU}">Remove</button>
        </li>`;
      };

      content.innerHTML = `<ul class="aq-list" id="aq-ul">${filtered.map(renderRow).join("")}</ul>`;

      content.querySelectorAll(".qremove").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const u = btn.dataset.username;
          btn.disabled = true;
          btn.textContent = "…";
          try {
            // Untag need_archive — favorites are no longer in the
            // queue automatically, so the only path here is the
            // manual flag.
            await setTag(u, "need_archive", false);
            flash(`Removed @${u}`);
            await refresh();
          } catch (e) {
            btn.disabled = false;
            btn.textContent = "Failed";
            flash(`Remove failed: ${e.message}`);
            setTimeout(() => { btn.textContent = "Remove"; }, 1500);
          }
        });
      });

      // Drag-and-drop reordering. Live-reorders the DOM as you drag
      // (so the drop target is obvious), then on drop persists the
      // new order via /api/archive-queue/order. Disabled while a
      // filter is active — reordering a filtered subset would lose
      // the positions of the hidden entries.
      const ul = $("#aq-ul");
      if (ul && !filterLower) {
        let draggedEl = null;
        ul.querySelectorAll("li").forEach((li) => {
          li.addEventListener("dragstart", (e) => {
            draggedEl = li;
            li.classList.add("dragging");
            e.dataTransfer.effectAllowed = "move";
            e.dataTransfer.setData("text/plain", li.dataset.username);
          });
          li.addEventListener("dragend", () => {
            li.classList.remove("dragging");
            ul.querySelectorAll("li").forEach((x) => x.classList.remove("drop-target"));
            draggedEl = null;
          });
          li.addEventListener("dragover", (e) => {
            if (!draggedEl || draggedEl === li) return;
            e.preventDefault();
            const rect = li.getBoundingClientRect();
            const before = (e.clientY - rect.top) < rect.height / 2;
            ul.insertBefore(draggedEl, before ? li : li.nextSibling);
          });
        });
        ul.addEventListener("drop", async (e) => {
          e.preventDefault();
          const order = [...ul.querySelectorAll("li")].map((li) => li.dataset.username);
          try {
            await saveOrder(order);
            _currentQueue = order;
            flash("Order saved");
          } catch (err) {
            flash(`Save failed: ${err.message}`);
            await refresh();
          }
        });
      }
    }

    async function refresh() {
      try {
        const data = await fetchQueue();
        render(data);
      } catch (e) {
        $("#aq-content").innerHTML = `<div class="aq-empty">Couldn't load queue: ${escapeHtml(e.message)}</div>`;
      }
    }

    async function doAdd() {
      const input = $("#aq-add-input");
      const btn = $("#aq-add-btn");
      const raw = input.value || "";
      // Split on commas, whitespace, and newlines so the user can
      // paste a list of usernames or URLs at once. The server
      // normalizes each entry (URL → username) and reports per-input
      // results.
      const candidates = raw
        .split(/[\s,]+/)
        .map((s) => s.trim())
        .filter(Boolean);
      if (candidates.length === 0) return;
      btn.disabled = true;
      btn.textContent = candidates.length > 1 ? `Adding ${candidates.length}…` : "Adding…";
      try {
        const r = await fetch("/api/archive-queue/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ usernames: candidates }),
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(j.detail || `HTTP ${r.status}`);
        input.value = "";
        const added = j.added || 0;
        const failed = j.failed || 0;
        const cleared = j.cleared_markers || 0;
        let msg;
        if (added === 1 && failed === 0) {
          const u = j.results.find((x) => x.ok)?.username || "";
          msg = cleared
            ? `Re-queued @${u} (cleared archive marker)`
            : `Added @${u}`;
        } else {
          msg = `Added ${added}${failed ? ` · ${failed} invalid` : ""}${cleared ? ` · cleared ${cleared} archive marker${cleared === 1 ? "" : "s"}` : ""}`;
        }
        flash(msg, 4000);
        // Surface per-entry errors so the user can see which inputs
        // were rejected (e.g. malformed URL, restricted handle).
        const errs = (j.results || []).filter((x) => !x.ok);
        if (errs.length > 0) {
          console.warn("[archive-queue] add failures:", errs);
        }
        await refresh();
        // Detect entries that succeeded the tag operation but didn't
        // land in the queue (folder exists with 0 files = "cleared
        // on purpose" signal). Tell the user how to fix.
        const successfulUsernames = (j.results || [])
          .filter((x) => x.ok)
          .map((x) => x.username);
        const stillMissing = successfulUsernames.filter((u) => !_currentQueue.includes(u));
        if (stillMissing.length > 0) {
          flash(`Tagged ${stillMissing.map((u) => "@" + u).join(", ")}, but not in queue. Their data/media/<u>/ folder exists with 0 files (your "I cleared this" signal). Delete those empty folders to re-enable archiving.`, 6000);
        }
      } catch (e) {
        flash(`Add failed: ${e.message}`);
      } finally {
        btn.disabled = false;
        btn.textContent = "Add";
      }
    }

    $("#aq-add-btn").addEventListener("click", doAdd);
    $("#aq-add-input").addEventListener("keydown", (e) => { if (e.key === "Enter") doAdd(); });
    $("#aq-search-input").addEventListener("input", (e) => {
      _filter = e.target.value || "";
      // Re-render from cached fetch — refetch is unnecessary for filter.
      refresh();
    });

    refresh();
  </script>
</body>
</html>
