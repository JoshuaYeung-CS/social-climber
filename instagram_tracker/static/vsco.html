<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/styles.css?v=6" />
  <title>VSCO archive — all profiles</title>
  <style>
    body { padding: 32px 24px 80px; }
    .vsco-head {
      max-width: 1280px;
      margin: 0 auto 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }
    .vsco-head h1 { margin: 0; font-size: 30px; font-weight: 700; }
    .vsco-head .stats { color: var(--muted); font-size: 14px; font-variant-numeric: tabular-nums; }
    /* Top nav row: 'Back to tracker' far left, 'all profiles' button
       centered (only present when we're in the expanded view). Both
       use the same .back-link visual but the all-profiles one is
       slightly larger and pulled toward the middle for thumb reach. */
    .vsco-head-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 1280px;
      margin: 0 auto 4px;
      gap: 12px;
    }
    .vsco-head-nav .nav-spacer { flex: 1; min-width: 0; }
    .vsco-head .back-link {
      color: var(--muted); text-decoration: none; font-size: 13px;
      padding: 6px 12px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg-elev-2);
      white-space: nowrap;
    }
    .vsco-head .back-link:hover { border-color: var(--accent); color: var(--accent); }
    .vsco-head .all-profiles-btn {
      /* Larger + more prominent than the corner Back-to-tracker chip;
         primary nav action when you're viewing a single profile. */
      font-size: 15px;
      padding: 9px 18px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      background: var(--bg-elev-2);
      color: var(--text);
      border: 1px solid var(--border);
      transition: border-color 120ms ease, color 120ms ease;
      /* Pull toward middle a touch. justify-content: space-between on
         the parent puts this on the right; a small negative margin
         nudges it toward center without breaking the layout. */
      margin-right: 14%;
    }
    .vsco-head .all-profiles-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .vsco-grid {
      max-width: 1280px; margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .vsco-user-card {
      background: var(--bg-elev-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; cursor: pointer;
      transition: border-color 120ms ease, transform 120ms ease;
    }
    .vsco-user-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .vsco-user-card h3 {
      margin: 0 0 6px 0; font-size: 16px; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .vsco-user-card h3 .vsco-card-actions {
      display: inline-flex; gap: 6px; margin-left: auto;
      align-items: center;
    }
    .vsco-user-card h3 a, .vsco-user-card h3 button {
      color: var(--muted); font-size: 12px; text-decoration: none;
      background: transparent; border: 0; padding: 2px 4px;
      cursor: pointer; border-radius: 4px;
    }
    .vsco-user-card h3 a:hover { color: var(--accent); }
    .vsco-user-card h3 button.delete-profile:hover { color: var(--bad); }
    .vsco-user-card .meta {
      font-size: 12px; color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .vsco-thumb-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px; margin-top: 10px;
    }
    .vsco-thumb-strip img {
      width: 100%; aspect-ratio: 1 / 1; object-fit: cover;
      border-radius: 4px; background: #111;
    }

    /* Expanded view — replaces the grid when a user is opened. */
    .vsco-expanded { max-width: 1280px; margin: 0 auto; }
    .vsco-expanded-head {
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    }
    .vsco-expanded-head h2 { margin: 0; font-size: 22px; font-weight: 600; }
    .vsco-expanded-head .stats { color: var(--muted); font-size: 13px; }
    .vsco-expanded-head .close-btn {
      margin-left: auto;
      padding: 6px 12px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg-elev-2);
      color: var(--text); cursor: pointer; font-size: 13px;
    }
    .vsco-expanded-head .close-btn:hover { border-color: var(--accent); color: var(--accent); }
    .vsco-expanded-grid {
      display: grid;
      /* Larger tiles per user request — was 220, now 340. With
         high-res archived files (?w=2400) these render much sharper. */
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 8px;
    }
    /* Per-tile card. aspect-ratio + background lives on the tile
       itself so the cell reserves its 1:1 box BEFORE the image
       loads — otherwise everything collapses to 0-height and the
       absolute-positioned overlay buttons stack vertically. */
    .vsco-tile {
      position: relative;
      cursor: zoom-in;
      aspect-ratio: 1 / 1;
      background: #111;
      border-radius: 6px;
      overflow: hidden;
    }
    .vsco-tile img, .vsco-tile video {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .vsco-tile .delete-tile {
      position: absolute;
      top: 6px; right: 6px;
      width: 28px; height: 28px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.15);
      cursor: pointer;
      font-size: 14px;
      opacity: 0; transition: opacity 120ms ease;
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
    }
    .vsco-tile:hover .delete-tile { opacity: 1; }
    .vsco-tile .delete-tile:hover { background: var(--bad); border-color: var(--bad); }

    /* Multi-select mode. The grid wrapper carries .select-mode when
       active; tiles toggle a .selected class on click instead of
       opening the lightbox. Selected tiles get an accent ring + a
       checkmark overlay. Per-tile trash button hides in select mode
       — bulk delete only comes from the floating bottom bar. */
    .vsco-expanded-grid.select-mode .vsco-tile,
    .vsco-grid.select-mode .vsco-user-card { cursor: pointer; }
    .vsco-expanded-grid.select-mode .vsco-tile .delete-tile,
    .vsco-grid.select-mode .vsco-user-card .delete-profile { display: none; }
    .vsco-tile.selected, .vsco-user-card.selected {
      outline: 3px solid var(--accent);
      outline-offset: -3px;
    }
    .vsco-tile.selected::after, .vsco-user-card.selected::after {
      content: "✓";
      position: absolute;
      top: 8px; left: 8px;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-size: 14px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      z-index: 4;
      pointer-events: none;
    }
    .vsco-user-card { position: relative; }  /* so ::after positions correctly */

    /* Select / Cancel toggle in the page header. */
    .header-select-btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-elev-2);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
    }
    .header-select-btn:hover,
    .header-select-btn.active { border-color: var(--accent); color: var(--accent); }

    /* Floating action bar — appears at the bottom-center when one or
       more items are selected. Tap-targets sized for thumb reach. */
    .vsco-select-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      z-index: 500;
      font-size: 13px;
    }
    .vsco-select-bar[hidden] { display: none; }
    .vsco-select-bar .count { font-variant-numeric: tabular-nums; }
    .vsco-select-bar button {
      padding: 7px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
    }
    .vsco-select-bar button:hover { border-color: var(--accent); color: var(--accent); }
    .vsco-select-bar button.danger {
      background: var(--bad);
      color: white;
      border-color: var(--bad);
    }
    .vsco-select-bar button.danger:hover { opacity: 0.85; color: white; border-color: var(--bad); }

    /* Fullsize lightbox. */
    .vsco-lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; cursor: zoom-out;
    }
    .vsco-lightbox img, .vsco-lightbox video {
      max-width: 92vw; max-height: 92vh; object-fit: contain;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .vsco-lightbox[hidden] { display: none; }

    .empty {
      text-align: center; color: var(--muted);
      padding: 60px 20px; font-size: 14px;
    }
  </style>
</head>
<body>
  <header class="vsco-head">
    <div class="vsco-head-nav">
      <a href="/" class="back-link">← Back to tracker</a>
      <span class="nav-spacer"></span>
      <button type="button" class="all-profiles-btn" id="all-profiles-btn" hidden>← All profiles</button>
      <button type="button" class="header-select-btn" id="select-toggle-btn">Select</button>
    </div>
    <h1>📷 VSCO archive</h1>
    <div class="stats" id="stats">loading…</div>
  </header>

  <main id="root" class="vsco-grid"></main>
  <div id="lightbox" class="vsco-lightbox" hidden></div>
  <div class="vsco-select-bar" id="select-bar" hidden>
    <span class="count" id="select-count">0 selected</span>
    <button type="button" id="select-cancel-btn">Cancel</button>
    <button type="button" class="danger" id="select-delete-btn">🗑 Delete</button>
  </div>

  <script>
    // Self-contained VSCO archive browser. Three views (no router):
    //   - Grid of user cards (default).
    //   - Per-user gallery (when a card is clicked).
    //   - Fullsize lightbox (when a gallery tile is clicked).
    // Uses /api/vsco-summary + /api/vsco-list/<user> as the data source
    // and /api/vsco-media/<user>/<file> as the actual image URL.
    const root = document.getElementById("root");
    const statsEl = document.getElementById("stats");
    const lightbox = document.getElementById("lightbox");
    const allProfilesBtn = document.getElementById("all-profiles-btn");
    const selectToggleBtn = document.getElementById("select-toggle-btn");
    const selectBar = document.getElementById("select-bar");
    const selectCountEl = document.getElementById("select-count");
    const selectCancelBtn = document.getElementById("select-cancel-btn");
    const selectDeleteBtn = document.getElementById("select-delete-btn");

    // Top-of-page "All profiles" button — hidden on the grid view,
    // shown in the expanded per-profile view. Calls renderUserGrid
    // which also takes care of toggling its own visibility.
    allProfilesBtn.addEventListener("click", () => renderUserGrid());

    // Selection state. selectMode is "grid" | "gallery" | null. The
    // grid mode tracks usernames; gallery mode tracks media filenames
    // for the current user. Bulk delete fans out per-item DELETEs.
    let selectMode = null;
    let selectedKeys = new Set();
    let activeUser = null;  // for gallery mode

    function _refreshSelectBar() {
      const n = selectedKeys.size;
      selectBar.hidden = !selectMode || n === 0;
      selectCountEl.textContent = `${n} selected`;
    }
    function _exitSelectMode() {
      selectMode = null;
      selectedKeys.clear();
      selectToggleBtn.classList.remove("active");
      selectToggleBtn.textContent = "Select";
      const grid = document.querySelector(".vsco-grid, .vsco-expanded-grid");
      if (grid) grid.classList.remove("select-mode");
      for (const sel of document.querySelectorAll(".selected")) sel.classList.remove("selected");
      _refreshSelectBar();
    }
    function _enterSelectMode() {
      selectMode = (root.className.includes("vsco-expanded")) ? "gallery" : "grid";
      selectedKeys.clear();
      selectToggleBtn.classList.add("active");
      selectToggleBtn.textContent = "Cancel";
      const grid = document.querySelector(".vsco-grid, .vsco-expanded-grid");
      if (grid) grid.classList.add("select-mode");
      _refreshSelectBar();
    }
    selectToggleBtn.addEventListener("click", () => {
      if (selectMode) _exitSelectMode();
      else _enterSelectMode();
    });
    selectCancelBtn.addEventListener("click", _exitSelectMode);
    selectDeleteBtn.addEventListener("click", async () => {
      const keys = Array.from(selectedKeys);
      if (!keys.length) return;
      const label = selectMode === "grid"
        ? `Delete ${keys.length} entire profile${keys.length === 1 ? "" : "s"}? This removes every archived file for ${keys.length === 1 ? "that profile" : "those profiles"}.`
        : `Delete ${keys.length} file${keys.length === 1 ? "" : "s"}?`;
      if (!confirm(label)) return;
      selectDeleteBtn.disabled = true;
      selectDeleteBtn.textContent = `🗑 Deleting…`;
      let failed = 0;
      for (const k of keys) {
        const url = selectMode === "grid"
          ? `/api/vsco-profile/${encodeURIComponent(k)}`
          : `/api/vsco-media/${encodeURIComponent(activeUser.username)}/${encodeURIComponent(k)}`;
        try {
          const r = await fetch(url, { method: "DELETE" });
          if (!r.ok && r.status !== 404) failed += 1;
        } catch (_) { failed += 1; }
      }
      selectDeleteBtn.disabled = false;
      selectDeleteBtn.textContent = `🗑 Delete`;
      if (failed) alert(`${failed} delete${failed === 1 ? "" : "s"} failed; see network panel.`);
      // Re-render the current view to reflect the deletes.
      const wasMode = selectMode;
      if (wasMode === "grid") {
        _exitSelectMode();
        renderUserGrid();
      } else if (wasMode === "gallery" && activeUser) {
        _exitSelectMode();
        renderUserGallery(activeUser);
      }
    });

    function fmtBytes(n) {
      if (n < 1024) return n + " B";
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
      if (n < 1024 * 1024 * 1024) return (n / (1024 * 1024)).toFixed(1) + " MB";
      return (n / (1024 * 1024 * 1024)).toFixed(2) + " GB";
    }
    function fmtMtime(secs) {
      if (!secs) return "";
      const d = new Date(secs * 1000);
      return d.toLocaleString();
    }
    function escapeText(s) {
      return String(s == null ? "" : s);
    }

    function isVideo(name) {
      return /\.(mp4|mov|webm|m4v)$/i.test(name || "");
    }

    function openLightbox(url, name) {
      lightbox.innerHTML = "";
      const el = isVideo(name)
        ? Object.assign(document.createElement("video"), { src: url, controls: true, autoplay: true })
        : Object.assign(document.createElement("img"), { src: url, alt: name });
      lightbox.appendChild(el);
      lightbox.hidden = false;
    }
    lightbox.addEventListener("click", () => { lightbox.hidden = true; lightbox.innerHTML = ""; });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !lightbox.hidden) {
        lightbox.hidden = true; lightbox.innerHTML = "";
      }
    });

    async function renderUserGrid() {
      // Exiting any open select mode when we re-enter the grid view,
      // both because the selection state was specific to whatever we
      // came from AND because the .select-mode class lives on the
      // grid wrapper we're about to recreate.
      if (selectMode) _exitSelectMode();
      activeUser = null;
      root.className = "vsco-grid";
      root.innerHTML = "";
      allProfilesBtn.hidden = true;
      let data;
      try {
        const r = await fetch("/api/vsco-summary");
        data = await r.json();
      } catch (e) {
        root.innerHTML = `<div class="empty">Failed to load /api/vsco-summary: ${escapeText(e.message)}</div>`;
        statsEl.textContent = "";
        return;
      }
      const users = data.users || [];
      if (!users.length) {
        statsEl.textContent = "no profiles archived yet";
        root.innerHTML = `<div class="empty">Run the extension's 🕶️ Archive all VSCO tabs command first — the saved files will show up here.</div>`;
        return;
      }
      const totalFiles = users.reduce((a, u) => a + (u.count || 0), 0);
      const totalBytes = users.reduce((a, u) => a + (u.bytes || 0), 0);
      statsEl.textContent = `${users.length} profile${users.length === 1 ? "" : "s"} · ${totalFiles.toLocaleString()} files · ${fmtBytes(totalBytes)}`;
      for (const u of users) {
        const card = document.createElement("div");
        card.className = "vsco-user-card";
        card.dataset.username = u.username;
        const head = document.createElement("h3");
        head.appendChild(document.createTextNode("@" + u.username));
        const actions = document.createElement("span");
        actions.className = "vsco-card-actions";
        const ext = document.createElement("a");
        ext.href = "https://vsco.co/" + u.username + "/gallery";
        ext.target = "_blank";
        ext.rel = "noopener";
        ext.textContent = "↗";
        ext.title = "Open on VSCO";
        ext.addEventListener("click", (e) => e.stopPropagation());
        actions.appendChild(ext);
        const del = document.createElement("button");
        del.type = "button";
        del.className = "delete-profile";
        del.textContent = "🗑";
        del.title = "Delete every archived file for @" + u.username;
        del.addEventListener("click", async (e) => {
          e.stopPropagation();
          if (!confirm(`Delete every archived file for @${u.username}? (${u.count} files, ${fmtBytes(u.bytes || 0)})`)) return;
          try {
            const r = await fetch(`/api/vsco-profile/${encodeURIComponent(u.username)}`, { method: "DELETE" });
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            card.remove();
          } catch (err) {
            alert(`Delete failed: ${err.message || err}`);
          }
        });
        actions.appendChild(del);
        head.appendChild(actions);
        card.appendChild(head);
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = `${u.count} files · ${fmtBytes(u.bytes || 0)} · last ${fmtMtime(u.latest_mtime)}`;
        card.appendChild(meta);
        // Tease 3 thumbs lazily — fetch list, pick first three, attach.
        const strip = document.createElement("div");
        strip.className = "vsco-thumb-strip";
        card.appendChild(strip);
        fetch("/api/vsco-list/" + encodeURIComponent(u.username))
          .then((r) => r.json())
          .then((d) => {
            const items = (d.items || []).slice(0, 3);
            for (const it of items) {
              const name = it.media_id + "." + it.ext;
              if (isVideo(name)) {
                const v = document.createElement("video");
                v.src = it.url;
                v.muted = true;
                strip.appendChild(v);
              } else {
                const img = document.createElement("img");
                img.loading = "lazy";
                img.src = it.url;
                strip.appendChild(img);
              }
            }
          })
          .catch(() => {});
        card.addEventListener("click", (e) => {
          if (selectMode === "grid") {
            const key = u.username;
            if (selectedKeys.has(key)) {
              selectedKeys.delete(key);
              card.classList.remove("selected");
            } else {
              selectedKeys.add(key);
              card.classList.add("selected");
            }
            _refreshSelectBar();
            return;
          }
          renderUserGallery(u);
        });
        root.appendChild(card);
      }
    }

    async function renderUserGallery(u) {
      if (selectMode) _exitSelectMode();
      activeUser = u;
      root.className = "vsco-expanded";
      // No more inline 'back to all profiles' button — replaced by the
      // top-nav button right next to 'Back to tracker' (bigger,
      // easier to reach).
      root.innerHTML = `
        <div class="vsco-expanded-head">
          <h2>@${escapeText(u.username)}</h2>
          <span class="stats">${u.count} files · ${fmtBytes(u.bytes || 0)}</span>
        </div>
        <div class="vsco-expanded-grid" id="grid"></div>
      `;
      allProfilesBtn.hidden = false;
      statsEl.textContent = `@${u.username} — ${u.count} files`;
      const grid = document.getElementById("grid");
      try {
        const r = await fetch("/api/vsco-list/" + encodeURIComponent(u.username));
        const d = await r.json();
        const items = d.items || [];
        if (!items.length) {
          grid.innerHTML = `<div class="empty">No files saved yet for this profile.</div>`;
          return;
        }
        for (const it of items) {
          const name = it.media_id + "." + it.ext;
          const tile = document.createElement("div");
          tile.className = "vsco-tile";
          const media = isVideo(name)
            ? Object.assign(document.createElement("video"), { src: it.url, muted: true, preload: "metadata" })
            : Object.assign(document.createElement("img"), { src: it.url, loading: "lazy" });
          tile.appendChild(media);
          // Tile-level click handles both modes; media click no longer
          // opens the lightbox by itself (it's a child of the tile).
          tile.addEventListener("click", (e) => {
            // Don't trigger if the delete button (or its descendants)
            // was the target.
            if (e.target.closest(".delete-tile")) return;
            if (selectMode === "gallery") {
              const key = name;
              if (selectedKeys.has(key)) {
                selectedKeys.delete(key);
                tile.classList.remove("selected");
              } else {
                selectedKeys.add(key);
                tile.classList.add("selected");
              }
              _refreshSelectBar();
              return;
            }
            openLightbox(it.url, name);
          });
          // Per-tile delete overlay. Stop propagation so clicking the
          // trash doesn't open the lightbox underneath.
          const del = document.createElement("button");
          del.type = "button";
          del.className = "delete-tile";
          del.textContent = "🗑";
          del.title = "Delete this file";
          del.addEventListener("click", async (e) => {
            e.stopPropagation();
            if (!confirm(`Delete ${name}?`)) return;
            try {
              const dr = await fetch(`/api/vsco-media/${encodeURIComponent(u.username)}/${encodeURIComponent(name)}`, { method: "DELETE" });
              if (!dr.ok) throw new Error(`HTTP ${dr.status}`);
              tile.remove();
            } catch (err) {
              alert(`Delete failed: ${err.message || err}`);
            }
          });
          tile.appendChild(del);
          grid.appendChild(tile);
        }
      } catch (e) {
        grid.innerHTML = `<div class="empty">Failed to load: ${escapeText(e.message)}</div>`;
      }
    }

    renderUserGrid();
  </script>
</body>
</html>
